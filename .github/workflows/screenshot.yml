name: Capture screenshots

# Boots the app under Xvfb + software GL and runs the gated devshot harness
# (Main.gd, PM98_SHOT_DIR) to capture home/squad/player PNGs. Uses the committed
# sample data only (no copyrighted club data). Manual trigger; download the
# artifact and commit the PNGs to screenshots/.

on:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.2

jobs:
  shot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xvfb + software GL
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        run: |
          set -e
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "$URL"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot
          ./godot --version

      - name: Pre-import project resources
        working-directory: app
        run: |
          "$GITHUB_WORKSPACE/godot" --headless --import . || true
          "$GITHUB_WORKSPACE/godot" --headless --import .

      - name: Capture screenshots
        working-directory: app
        run: |
          set -e
          mkdir -p shots
          PM98_SHOT_DIR="$PWD/shots" LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 720x1280x24" \
            "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 --resolution 720x1280 . \
            2>&1 | tee shot.log || true
          echo "--- DEVSHOT log lines ---"; grep -i devshot shot.log || true
          echo "--- captured ---"; ls -la shots/
          test -s shots/home.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: app/shots/*.png
          retention-days: 7
