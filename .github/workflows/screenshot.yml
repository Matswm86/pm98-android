name: Capture screenshots

# Boots the app under Xvfb + software GL and runs the gated devshot harness
# (Main.gd, PM98_SHOT_DIR) to capture home/squad/player PNGs. Uses the committed
# sample data only (no copyrighted club data). Manual trigger; download the
# artifact and commit the PNGs to screenshots/.

on:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.2

jobs:
  shot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xvfb + software GL
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        run: |
          set -e
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "$URL"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot
          ./godot --version

      - name: Pre-import project resources
        working-directory: app
        run: |
          "$GITHUB_WORKSPACE/godot" --headless --import . || true
          "$GITHUB_WORKSPACE/godot" --headless --import .

      - name: Capture screenshots
        working-directory: app
        run: |
          set -e
          mkdir -p shots
          # FAITHFUL boot repro: run the NORMAL app (main scene, real stretch/viewport)
          # with PM98_BOOT_SHOT so _boot raises the title the real way and captures the
          # booted frame. Base res then a phone res. (cp because both write boot.png.)
          PM98_SHOT_DIR="$PWD/shots" PM98_BOOT_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 1280x720x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 1280x720 . 2>&1 | tee boot720.log || true
          cp -f shots/boot.png shots/boot_720.png 2>/dev/null || true
          PM98_SHOT_DIR="$PWD/shots" PM98_BOOT_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee bootphone.log || true
          cp -f shots/boot.png shots/boot_phone.png 2>/dev/null || true
          echo "--- BOOT diagnostics ---"; grep -iE "BOOT-SHOT|SCRIPT ERROR|error" boot720.log bootphone.log | head -20 || true
          # B1 FAITHFUL hub repro: run the NORMAL app with PM98_HUB_SHOT so _boot begins a
          # career through the real nav and captures the persistent MENUPRINCIPAL hub (proves
          # the career hub is the original art, not the old green list). Phone res.
          PM98_SHOT_DIR="$PWD/shots" PM98_HUB_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee hub.log || true
          echo "--- HUB diagnostics ---"; grep -iE "HUB-SHOT|SCRIPT ERROR|error" hub.log | head -20 || true
          # Track-B FAITHFUL browse repro: walk the real nav (home/database, new-career
          # pickers, league browse, a watched match) capturing the PM98-chrome screens.
          PM98_SHOT_DIR="$PWD/shots" PM98_BROWSE_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee browse.log || true
          echo "--- BROWSE diagnostics ---"; grep -iE "BROWSE-SHOT|SHOT .*png|SCRIPT ERROR|error" browse.log | head -20 || true
          # A1 FAITHFUL match-view repro: build a real fixture timeline, mount the live
          # MatchScreen, capture it at kick-off / a goal minute / late on (proves the DATSIM
          # sprite pitch renders in the engine, not just the PIL mirror).
          PM98_SHOT_DIR="$PWD/shots" PM98_MATCH_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee match.log || true
          echo "--- MATCH diagnostics ---"; grep -iE "MATCH-SHOT|SHOT .*png|SCRIPT ERROR|error" match.log | head -20 || true
          # Injuries/suspensions + NEWS feed: play a few weeks, force a visible injury +
          # suspension, capture the SQUAD screen (INJ/SUS markers) and the CLUB NEWS feed.
          PM98_SHOT_DIR="$PWD/shots" PM98_NEWS_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee news.log || true
          echo "--- NEWS diagnostics ---"; grep -iE "NEWS-SHOT|SHOT .*png|SCRIPT ERROR|error" news.log | head -20 || true
          # Training (player development): begin a career, set Intensive, capture the
          # TRAINING screen (intensity lever + squad development trend).
          PM98_SHOT_DIR="$PWD/shots" PM98_TRAIN_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee train.log || true
          echo "--- TRAIN diagnostics ---"; grep -iE "TRAIN-SHOT|SHOT .*png|SCRIPT ERROR|error" train.log | head -20 || true
          # Youth team: begin a career, develop the academy a season so a youngster reaches
          # first-team grade, capture the YOUTH TEAM screen (potential stars + READY/PROMOTE).
          PM98_SHOT_DIR="$PWD/shots" PM98_YOUTH_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee youth.log || true
          echo "--- YOUTH diagnostics ---"; grep -iE "YOUTH-SHOT|SHOT .*png|SCRIPT ERROR|error" youth.log | head -20 || true
          # Staff (EMPLE): begin a career, hire one of each role, capture the STAFF screen
          # (current staff + available pool, wage bill and the live effect on the systems).
          PM98_SHOT_DIR="$PWD/shots" PM98_STAFF_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee staff.log || true
          echo "--- STAFF diagnostics ---"; grep -iE "STAFF-SHOT|SHOT .*png|SCRIPT ERROR|error" staff.log | head -20 || true
          # F.A. Cup: begin a career, play into the season so several cup rounds are
          # drawn/played, capture the CUP screen (run + latest draw + trophy art).
          PM98_SHOT_DIR="$PWD/shots" PM98_CUP_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 90 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee cup.log || true
          echo "--- CUP diagnostics ---"; grep -iE "CUP-SHOT|SHOT .*png|SCRIPT ERROR|error" cup.log | head -20 || true
          # Reconstructed art overlays (league table / line-up / squad / finances /
          # transfer / board / stadium) as REAL in-engine captures (replacing the PIL mirrors).
          PM98_SHOT_DIR="$PWD/shots" PM98_SCREENS_SHOT=1 LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 2400x1080x24" \
            timeout 120 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 2400x1080 . 2>&1 | tee screens.log || true
          echo "--- SCREENS diagnostics ---"; grep -iE "SCREENS-SHOT|SHOT .*png|SCRIPT ERROR|error" screens.log | head -20 || true
          # Direct art-screen render for comparison.
          PM98_SHOT_DIR="$PWD/shots" LIBGL_ALWAYS_SOFTWARE=1 \
            xvfb-run -a -s "-screen 0 1280x720x24" \
            timeout 120 "$GITHUB_WORKSPACE/godot" --rendering-driver opengl3 \
            --resolution 1280x720 --path . --script res://tests/shot_screens.gd \
            2>&1 | tee shot_art.log || true
          echo "--- captured ---"; ls -la shots/
          test -s shots/boot_720.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: app/shots/*.png
          retention-days: 7
