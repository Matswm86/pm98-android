name: Build Android APK

# The Godot project lives in app/ (the repo root holds RE tooling + docs).
# All Godot commands run from app/; the engine binary is downloaded to the repo
# root and referenced by absolute path ($GITHUB_WORKSPACE/godot).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.2
  EXPORT_NAME: pm98

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          set -e
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux headless)
        run: |
          set -e
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "$URL"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot
          ./godot --version

      - name: Download Godot Android export templates
        run: |
          set -e
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          wget -q "$URL"
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL_DIR"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* "$TPL_DIR/"
          ls "$TPL_DIR" | head -20

      - name: Restore (or generate) debug keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Decoding stable keystore from ANDROID_DEBUG_KEYSTORE_BASE64 secret"
            echo -n "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/debug.keystore"
          else
            echo "Secret not set — generating fresh ephemeral keystore (signature will change per build)"
            keytool -genkeypair -v \
              -keystore "$GITHUB_WORKSPACE/debug.keystore" \
              -alias androiddebugkey \
              -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storetype PKCS12
          fi
          keytool -list -keystore "$GITHUB_WORKSPACE/debug.keystore" -storepass android | grep -E "fingerprint|Keystore type" | head -3

      - name: Configure Godot editor settings (SDK + keystore paths)
        run: |
          set -e
          CFG_DIR="$HOME/.config/godot"
          mkdir -p "$CFG_DIR"
          GODOT_MINOR=$(echo "$GODOT_VERSION" | cut -d. -f1-2)
          SETTINGS_FILE="$CFG_DIR/editor_settings-${GODOT_MINOR}.tres"
          cat > "$SETTINGS_FILE" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          echo "Wrote $SETTINGS_FILE"
          cat "$SETTINGS_FILE"

      # Using the prebuilt export template (gradle_build/use_gradle_build=false),
      # so no Android Gradle build template install is needed — the bundled
      # android_debug.apk template is repackaged and signed with the debug keystore.

      - name: Pre-import project resources
        working-directory: app
        run: |
          "$GITHUB_WORKSPACE/godot" --headless --import . || true
          "$GITHUB_WORKSPACE/godot" --headless --import .

      - name: Script compile guard (never ship a grey/broken APK)
        working-directory: app
        run: |
          # Boot the real project headless (autoloads registered, main scene loaded) and
          # fail the build if ANY script fails to parse/compile. A broken main script
          # loads as a grey screen on device, which an import-only check does not catch.
          set -e
          LOG="$("$GITHUB_WORKSPACE/godot" --headless --quit-after 60 . 2>&1 || true)"
          echo "$LOG" | tail -30
          if echo "$LOG" | grep -qiE "SCRIPT ERROR|Parse Error|Compile Error|Failed to load script"; then
            echo "::error::GDScript parse/compile error detected — refusing to build a broken APK"
            exit 1
          fi
          echo "Scripts compile clean."

      - name: Diagnostic dump
        run: |
          echo "--- ~/.config/godot listing ---"
          ls -la "$HOME/.config/godot/" || true
          echo "--- all editor_settings*.tres ---"
          for f in "$HOME/.config/godot/"editor_settings*.tres; do
            echo ">>> $f"; cat "$f" || true; echo
          done
          echo "--- export templates dir ---"
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/" || true

      - name: Diagnose export config
        working-directory: app
        run: |
          echo "--- export_presets.cfg (head) ---"; head -20 export_presets.cfg
          echo "--- export templates dir ---"
          ls "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/" | grep -i android || true
          echo "--- keystore ---"; ls -la "$GITHUB_WORKSPACE/debug.keystore" || true
          echo "--- SDK build-tools (apksigner/zipalign) ---"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || true

      - name: Export Android debug APK
        working-directory: app
        run: |
          set -o pipefail
          "$GITHUB_WORKSPACE/godot" --headless --verbose --export-debug "Android" "${EXPORT_NAME}.apk" 2>&1 | tee export.log
          rc=$?
          echo "--- export.log error/warning lines ---"
          grep -iE "error|warning|template|keystore|sdk|missing|invalid|config|not found|valid" export.log | head -60 || true
          ls -la "${EXPORT_NAME}.apk"
          # Cache-bust (gotcha #12): the rolling latest/<name>.apk URL is heavily cached by
          # Android/browsers, so a fixed filename keeps serving the OLD build. Give every build a
          # unique, uncacheable filename (commit SHA suffix). Keep pm98.apk too for the artifact.
          APK_FILE="${EXPORT_NAME}-${GITHUB_SHA:0:7}.apk"
          cp "${EXPORT_NAME}.apk" "$APK_FILE"
          echo "APK_FILE=$APK_FILE" >> "$GITHUB_ENV"
          ls -la "$APK_FILE"
          exit $rc

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: app/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Update rolling "latest" pre-release (main pushes)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (rolling)
          prerelease: true
          body: |
            Auto-built APK from latest `main` commit (${{ github.sha }}).
            Sideload only — debug-signed, not for distribution.

            **Install on phone:** download `${{ env.APK_FILE }}` (filename changes every
            build so your browser/Android can't serve a cached old APK), open it, allow
            "Install from this source" if Android prompts. If reinstalling over a previous
            build with a different signature, uninstall first.

            Ships with sample data only. Side-load your own `game_db.json`
            (built from owned game files) into the app's user data dir for the
            full database.
          files: app/${{ env.APK_FILE }}
          fail_on_unmatched_files: true

      - name: Create tagged release (vX.Y.Z tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}.
            Sideload only — debug-signed, not for distribution.
          files: app/${{ env.EXPORT_NAME }}.apk
          fail_on_unmatched_files: true
